<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>How Claude Code Works</title>
  <meta name="description" content="Claude Code 源码架构深度解析">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #7c5cfc;
      --sidebar-width: 260px;
      --sidebar-nav-link-color--active: #7c5cfc;
      --sidebar-nav-link-border-color--active: #7c5cfc;
      --code-theme-background: #f6f8fa;
      --code-inline-background: #f0f0f0;
    }
    .markdown-section h1 { border-bottom: 2px solid #7c5cfc; padding-bottom: 0.3em; }
    .markdown-section table { display: table; width: 100%; }
    .cover-main { max-width: 600px; }
    .cover-main blockquote { font-size: 1em; color: #666; }
    /* Language switcher button */
    .lang-switch-btn {
      position: fixed;
      top: 12px;
      right: 20px;
      z-index: 999;
      padding: 6px 16px;
      border: 1.5px solid #7c5cfc;
      border-radius: 20px;
      background: #fff;
      color: #7c5cfc;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .lang-switch-btn:hover {
      background: #7c5cfc;
      color: #fff;
    }
    .lang-switch-btn::before {
      content: '🌐';
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'How Claude Code Works',
      repo: 'https://github.com/Windy3f3f3f3f/how-claude-code-works',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      search: {
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 3,
        pathNamespaces: ['/', '/en'],
      },
      coverpage: false,
      alias: {
        '/en/(.*)': '/en/$1',
        '/en/_sidebar.md': '/en/_sidebar.md',
      },
      pagination: {
        previousText: '上一篇',
        nextText: '下一篇',
        crossChapter: true,
        crossChapterText: true,
      },
      markdown: {
        renderer: {
          code(code, lang) {
            if (lang === 'mermaid') {
              return '<div class="mermaid">' + code + '</div>';
            }
            return this.origin.code.apply(this, arguments);
          }
        }
      },
    }
  </script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    // Language switcher plugin — context-aware button
    window.$docsify.plugins = (window.$docsify.plugins || []).concat([
      function(hook) {
        hook.doneEach(function() {
          // Remove existing button if any
          var old = document.getElementById('lang-switch');
          if (old) old.remove();

          var hash = location.hash || '#/';
          var path = hash.slice(1); // e.g. "/docs/03-..." or "/en/docs/03-..."
          var isEn = path.startsWith('/en/') || path === '/en';
          var targetPath, label;

          if (isEn) {
            // Currently English → switch to Chinese
            label = '中文';
            targetPath = path.replace(/^\/en\/?/, '/') || '/';
          } else {
            // Currently Chinese → switch to English
            label = 'English';
            if (path === '/' || path === '') {
              targetPath = '/en/';
            } else {
              targetPath = '/en' + path;
            }
          }

          var btn = document.createElement('a');
          btn.id = 'lang-switch';
          btn.className = 'lang-switch-btn';
          btn.href = '#' + targetPath;
          btn.textContent = label;
          document.body.appendChild(btn);
        });

        // Mermaid rendering
        hook.doneEach(function() {
          document.querySelectorAll('.mermaid').forEach(function(el) {
            if (el.getAttribute('data-processed')) return;
            var code = el.textContent;
            var id = 'mermaid-' + Math.random().toString(36).substr(2, 9);
            try {
              mermaid.render(id, code).then(function(result) {
                el.innerHTML = result.svg;
                el.setAttribute('data-processed', 'true');
              });
            } catch (e) {
              console.warn('Mermaid render error:', e);
            }
          });
        });
      }
    ]);
  </script>
  <!-- Code highlight -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
</body>
</html>
